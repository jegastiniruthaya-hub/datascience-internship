<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sentiment-Aware Chatbot</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-panel" aria-label="Multilingual chatbot">
        <header class="topbar">
          <div>
            <p class="eyebrow">Internship Prototype</p>
            <h1>Sentiment-Aware Chatbot</h1>
          </div>
          <div class="status" title="Supported languages">
            Positive · Neutral · Negative
          </div>
        </header>

        <div class="meta-grid" aria-label="Conversation analysis">
          <div>
            <span>Language</span>
            <strong id="language">English</strong>
          </div>
          <div>
            <span>Intent</span>
            <strong id="intent">greeting</strong>
          </div>
          <div>
            <span>Sentiment</span>
            <strong id="sentiment">neutral</strong>
          </div>
          <div>
            <span>Turns</span>
            <strong id="turns">0</strong>
          </div>
          <div>
            <span>Engine</span>
            <strong id="engine">offline</strong>
          </div>
        </div>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chatForm" class="composer">
          <input
            id="messageInput"
            type="text"
            autocomplete="off"
            placeholder="Try: I am frustrated because my order is late"
            aria-label="Message"
          />
          <button type="submit">Send</button>
        </form>
      </section>

      <aside class="demo-panel" aria-label="Demo prompts">
        <section class="api-settings" aria-label="OpenRouter settings">
          <h2>OpenRouter API</h2>
          <p id="apiStatus" class="api-status">Checking API status...</p>
          <form id="apiForm" class="api-form">
            <input
              id="apiKeyInput"
              type="password"
              autocomplete="off"
              placeholder="sk-or-v1-..."
              aria-label="OpenRouter API key"
            />
            <input
              id="modelInput"
              type="text"
              value="openrouter/auto"
              aria-label="OpenRouter model"
            />
            <button type="submit">Save API Key</button>
          </form>
        </section>

        <h2>Sentiment Demo</h2>
        <button data-prompt="Thanks, this service is really helpful!">Positive customer</button>
        <button data-prompt="I am frustrated because my ticket is delayed and nobody helped me">Negative customer</button>
        <button data-prompt="What is the status of booking ID 4821?">Neutral customer</button>
        <button data-prompt="मुझे समस्या हो रही है, मेरा टिकट काम नहीं कर रहा">Hindi negative</button>
        <button data-prompt="I want to book a train ticket from Delhi to Mumbai tomorrow evening">Intent plus sentiment</button>
      </aside>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
